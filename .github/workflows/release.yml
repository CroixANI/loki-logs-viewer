name: Build & Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # requirements.txt includes pytest — no desktop deps needed for tests.
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    needs: test   # only runs if all tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python 3.11 is used for stability with PyInstaller 6.x.
      # Do not upgrade to 3.12+ without verifying PyInstaller compatibility.
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # requirements-desktop.txt includes requirements.txt (streamlit) plus
      # pywebview and pyinstaller at pinned versions.
      - name: Install dependencies
        run: pip install -r requirements-desktop.txt

      # windows.spec defines all datas, hiddenimports, and build flags.
      # Output: dist/LokiViewer.exe (windowed, no console, single file).
      - name: Build EXE
        run: pyinstaller windows.spec

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/LokiViewer.exe
          generate_release_notes: true
